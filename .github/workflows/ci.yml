name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: set up Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      # Step 4: run tests
      - name: Run tests
        run: mvn test

      # Step 5: build jar
      - name: Build jar
        run: mvn package -DskipTests

      # Step 6: upload jar as artifact
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: mutation-tracker-jar
          path: target/*.jar